# Stack de AMÉRICO en UN solo contenedor: API + panel + flota de 5 cuentas.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: americo:latest
    # No publicamos puertos al host: Coolify enruta el dominio a este puerto vía su proxy.
    # Para correr local con puerto publicado está docker-compose.override.yml (WEB_PORT).
    expose:
      - "8000"
    environment:
      PYTHONUNBUFFERED: "1"
      AMERICO_CONFIG: config.docker.yaml
      AMERICO_CORS_ORIGINS: ${AMERICO_CORS_ORIGINS:-*}
      AMERICO_RUN_FLEET: "1"
      # Opcional: Postgres gestionado de Coolify. Si está, la DB usa Postgres.
      DATABASE_URL: ${DATABASE_URL:-}
      # IA (opcional): la veta entradas por cuenta si está la key.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_API_SECRET: ${OKX_API_SECRET:-}
      OKX_API_PASSWORD: ${OKX_API_PASSWORD:-}
    volumes:
      - americo-data:/data
    restart: unless-stopped

volumes:
  americo-data:
