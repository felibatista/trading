# Stack de AMÉRICO en UN solo contenedor: API + panel + flota de 5 cuentas.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: americo:latest
    # No publicamos puertos al host: Coolify enruta el dominio a este puerto vía su proxy.
    # Para correr local con puerto publicado está docker-compose.override.yml (WEB_PORT).
    expose:
      - "8000"
    environment:
      # El dominio del panel se configura en la UI de Coolify (servicio `app` → Domains:
      #   https://trade-test.acentus.com.ar:8000  — el :8000 le dice a Coolify el puerto
      # interno). El proxy de Coolify enruta el dominio al 8000 del contenedor.
      PYTHONUNBUFFERED: "1"
      AMERICO_CONFIG: config.docker.yaml
      AMERICO_CORS_ORIGINS: ${AMERICO_CORS_ORIGINS:-*}
      AMERICO_RUN_FLEET: "1"
      # Opcional: Postgres gestionado de Coolify. Si está, la DB usa Postgres.
      DATABASE_URL: ${DATABASE_URL:-}
      # IA (opcional): veta entradas por cuenta si está la key del proveedor elegido.
      # Cada cuenta elige anthropic/openai y modelo desde el panel.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_API_SECRET: ${OKX_API_SECRET:-}
      OKX_API_PASSWORD: ${OKX_API_PASSWORD:-}
    volumes:
      - americo-data:/data
    restart: unless-stopped

volumes:
  americo-data:
